openapi: 3.0.3
info:
  title: Farm Management System API
  description: API for managing farm operations, timelines, and data ingestion
  version: 1.0.0
servers:
  - url: http://localhost:8000/api
    description: Development server

paths:
  /farms:
    get:
      summary: List all farms
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Farm'
      tags:
        - Farms

  /farms/{farmId}:
    get:
      summary: Get farm by ID
      parameters:
        - name: farmId
          in: path
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Farm'
        '404':
          description: Farm not found
      tags:
        - Farms

  /crops:
    post:
      summary: Create a new crop record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CropCreate'
      responses:
        '201':
          description: Crop created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Crop'
      tags:
        - Crops

  /timelines:
    get:
      summary: Get timeline events for a farm
      parameters:
        - name: farmId
          in: query
          required: true
          schema:
            type: integer
            example: 1
        - name: startDate
          in: query
          schema:
            type: string
            format: date
            example: "2024-01-01"
        - name: endDate
          in: query
          schema:
            type: string
            format: date
            example: "2024-12-31"
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TimelineEvent'
      tags:
        - Timelines

  /data-ingestion:
    post:
      summary: Ingest sensor or field data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataIngestionRequest'
      responses:
        '201':
          description: Data ingested successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataIngestionResponse'
        '400':
          description: Invalid data format
      tags:
        - Data Ingestion

components:
  schemas:
    Farm:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Green Valley Farm"
        location:
          type: string
          example: "40.7128,-74.0060"
        sizeAcres:
          type: number
          format: float
          example: 150.5
      required:
        - id
        - name

    CropCreate:
      type: object
      properties:
        farmId:
          type: integer
          example: 1
        cropType:
          type: string
          enum: [wheat, corn, soybean, potato]
          example: "corn"
        plantedDate:
          type: string
          format: date
          example: "2024-03-15"
        expectedHarvestDate:
          type: string
          format: date
          example: "2024-09-20"
      required:
        - farmId
        - cropType
        - plantedDate

    Crop:
      allOf:
        - $ref: '#/components/schemas/CropCreate'
        - type: object
          properties:
            id:
              type: integer
              example: 101
            createdAt:
              type: string
              format: date-time
              example: "2024-03-15T10:00:00Z"
      required:
        - id
        - createdAt

    TimelineEvent:
      type: object
      properties:
        id:
          type: integer
          example: 201
        farmId:
          type: integer
          example: 1
        title:
          type: string
          example: "Planted Corn"
        description:
          type: string
          example: "Corn planted in Field A"
        date:
          type: string
          format: date
          example: "2024-03-15"
        eventType:
          type: string
          enum: [planting, harvesting, irrigation, fertilization]
          example: "planting"
      required:
        - id
        - farmId
        - title
        - date

    DataIngestionRequest:
      type: object
      properties:
        sensorId:
          type: string
          example: "sensor-001"
        timestamp:
          type: string
          format: date-time
          example: "2024-05-01T08:30:00Z"
        temperatureC:
          type: number
          format: float
          example: 22.5
        humidityPercent:
          type: number
          format: float
          example: 65.0
        soilMoisture:
          type: number
          format: float
          example: 0.35
      required:
        - sensorId
        - timestamp

    DataIngestionResponse:
      type: object
      properties:
        id:
          type: integer
          example: 501
        status:
          type: string
          enum: [success, failed]
          example: "success"
        receivedAt:
          type: string
          format: date-time
          example: "2024-05-01T08:30:05Z"
      required:
        - id
        - status
        - receivedAt
